<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 206" width="200" height="206" role="img" aria-label="promptu mascot: a friendly popover panel with little feet, holding up the next prompt block">
  <title>promptu — block-stacking popover</title>

  <!-- mint badge background -->
  <rect x="6" y="4" width="188" height="198" rx="28" fill="#e3f2ee"/>

  <!-- feet -->
  <ellipse cx="78" cy="164" rx="11" ry="5" fill="#7D6EE8"/>
  <ellipse cx="122" cy="164" rx="11" ry="5" fill="#7D6EE8"/>

  <!-- arm holding the next block aloft -->
  <path d="M158 112 Q174 106 177 92" fill="none" stroke="#2b2b3a" stroke-width="9" stroke-linecap="round"/>
  <rect x="162" y="74" width="28" height="13" rx="6.5" fill="#E86A5E" transform="rotate(-12 176 80)"/>

  <!-- popover body with its arrow -->
  <path d="M100 47 L112 62 L88 62 Z" fill="#2b2b3a"/>
  <rect x="36" y="60" width="128" height="100" rx="14" fill="#2b2b3a"/>

  <!-- stacked prompt blocks + the point -->
  <rect x="52" y="80" width="46" height="9" rx="4.5" fill="#5BC8AF"/>
  <rect x="52" y="97" width="62" height="9" rx="4.5" fill="#F2B441"/>
  <rect x="52" y="114" width="34" height="9" rx="4.5" fill="#9B8CFF"/>
  <rect x="52" y="131" width="6" height="12" fill="#7c8198"/>
</svg>
